<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Ayyozone.in | Anti-Spending Portal</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body { background: #eaeded; font-family: sans-serif; }
        .amzn-btn { background: linear-gradient(to bottom, #f7dfa5, #f0c14b); border: 1px solid #a88734; }
    </style>
</head>
<body class="text-xs">
    <!-- Header -->
    <header class="bg-[#131921] text-white p-3 flex justify-between items-center sticky top-0 z-50">
        <span class="text-xl font-bold">ayyozone<span class="text-[#febd69]">.in</span></span>
        <div class="flex items-center gap-2">
            <span>🛒 Cart: <span id="cartCount">0</span></span>
        </div>
    </header>

    <!-- Main Grid -->
    <main class="max-w-[1200px] mx-auto p-4">
        <div id="productGrid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-4"></div>
    </main>

    <!-- Intercept Modal -->
    <div id="modal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center p-4">
        <div class="bg-white p-6 rounded shadow-xl text-center max-w-sm">
            <h2 class="text-lg font-bold text-red-600 mb-2">STOP! 🛑</h2>
            <p id="modalMsg" class="mb-4"></p>
            <img id="modalGif" src="" class="w-full h-48 object-cover mb-4">
            <button onclick="closeModal()" class="amzn-btn w-full py-2 font-bold rounded">Close & Save Money</button>
        </div>
    </div>

    <script>
        // Static Registry: Verified Real-World Products (No Loops/Generators)
        const products = [
            { id: 1, name: "Noise-Canceling Wireless Headphones", price: 4499, cat: "Electronics", img: "https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=400" },
            { id: 2, name: "Minimalist Cotton T-Shirt Set", price: 899, cat: "Apparel", img: "https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?w=400" },
            { id: 3, name: "Ergonomic Lumbar Memory Cushion", price: 1250, cat: "Home", img: "https://images.unsplash.com/photo-1584622650111-993a426fbf0a?w=400" },
            { id: 4, name: "Stainless Steel Vacuum Tumbler", price: 650, cat: "Kitchen", img: "https://images.unsplash.com/photo-1572480687126-c22262d6b38c?w=400" },
            { id: 5, name: "Portable Mechanical Keyboard", price: 2999, cat: "Electronics", img: "https://images.unsplash.com/photo-1595225476474-87563907a212?w=400" }
        ];

        function render() {
            const grid = document.getElementById('productGrid');
            products.forEach(p => {
                grid.innerHTML += `
                    <div class="bg-white p-3 border shadow-sm">
                        <img src="${p.img}" class="w-full h-32 object-cover mb-2">
                        <h3 class="font-bold">${p.name}</h3>
                        <p class="text-lg font-bold my-2">₹${p.price}</p>
                        <button onclick="intercept(${p.id})" class="amzn-btn w-full py-1 rounded">Buy Now</button>
                    </div>
                `;
            });
        }

        function intercept(id) {
            const p = products.find(x => x.id === id);
            document.getElementById('modalMsg').innerText = `Dabbulu dhandaga ra! Why are you buying ${p.name} for ₹${p.price}? Stay calm.`;
            document.getElementById('modalGif').src = "https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExMTA4YXB3eHN3YWFwZXhvdDJmdmdidXBzYXVzdmN2cHd0Z2g5MWpveSZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/Y0S4fVJVfscO4/giphy.gif";
            document.getElementById('modal').classList.remove('hidden');
        }

        function closeModal() { document.getElementById('modal').classList.add('hidden'); }
        
        render();
    </script>
</body>
</html>
