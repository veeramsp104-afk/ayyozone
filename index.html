<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ayyozone.in</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">

    <!-- Header Section -->
    <header class="bg-[#131921] text-white p-3 flex items-center">
        <div class="text-xl font-bold cursor-pointer">ayyozone<span class="text-yellow-500">.in</span></div>
        <div class="flex-1 mx-4 flex">
            <input type="text" id="searchInput" oninput="performSearch()" class="w-full p-2 text-black rounded" placeholder="Search Ayyozone.in">
        </div>
    </header>

    <!-- Product Grid -->
    <div id="productGrid" class="grid grid-cols-2 md:grid-cols-4 gap-4 p-4"></div>

    <!-- Custom Modal -->
    <div id="modal" class="fixed inset-0 bg-black bg-opacity-70 flex items-center justify-center hidden">
        <div class="bg-white p-8 rounded-lg shadow-xl text-center max-w-sm">
            <h2 class="text-2xl font-bold text-red-600 mb-4">STOP!</h2>
            <p id="modalMsg" class="mb-6"></p>
            <button onclick="closeModal()" class="bg-yellow-400 w-full py-2 rounded font-bold">Close & Save Money</button>
        </div>
    </div>

    <script>
        // Generate 5000 items
        const allProducts = Array.from({ length: 5000 }, (_, i) => ({
            id: i + 1,
            title: `Product ${i + 1}`,
            price: Math.floor(Math.random() * 5000) + 100,
            img: `https://picsum.photos/id/${(i % 1000) + 1}/300/300`
        }));

        function performSearch() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allProducts.filter(p => p.title.toLowerCase().includes(query));
            renderGrid(filtered);
        }

        function renderGrid(items) {
            const grid = document.getElementById('productGrid');
            grid.innerHTML = items.slice(0, 50).map(p => `
                <div class="bg-white p-3 border rounded shadow-sm">
                    <img src="${p.img}" class="w-full h-40 object-cover mb-2 rounded">
                    <p class="font-bold text-sm truncate">${p.title}</p>
                    <p class="text-red-600 font-bold">₹${p.price}</p>
                    <button onclick="intercept(${p.id})" class="bg-yellow-400 w-full py-1 mt-2 text-sm rounded font-bold">Buy Now</button>
                </div>
            `).join('');
        }

        function intercept(id) {
            const p = allProducts.find(x => x.id === id);
            document.getElementById('modalMsg').innerText = `Dabbulu dhandaga ra! Why are you trying to buy ${p.title} for ₹${p.price}?`;
            document.getElementById('modal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('modal').classList.add('hidden');
        }

        // Initialize
        renderGrid(allProducts);
    </script>
</body>
</html>
