<!-- Logic Script -->
    <script>
        // 1. Generate 2000 Unique Items with Matching, Non-Repeating 1920x1080 Images
        const itemTypes = ["smartphone", "laptop", "sofa", "sneakers", "watch", "camera", "headphones", "perfume", "television", "backpack"];
        const brands = ["TechPro", "Nova", "Luxe", "Stride", "Chrono", "Optic", "Aura", "Essence", "Vision", "Apex"];

        const allProducts = Array.from({ length: 2000 }, (_, i) => {
            const typeIndex = i % itemTypes.length;
            const type = itemTypes[typeIndex];
            const brand = brands[typeIndex];
            
            return {
                id: i + 1,
                category: type.toUpperCase() + " DEALS",
                title: `${brand} Premium ${type.charAt(0).toUpperCase() + type.slice(1)} - Edition ${i + 1000}`,
                price: (Math.floor(Math.random() * 45000) + 999).toLocaleString('en-IN'),
                // Uses a dynamic image service to pull a real, 1920x1080 photorealistic image matching the exact keyword.
                // The 'lock' parameter guarantees the image is unique and never repeats across the 2000 items.
                img: `https://loremflickr.com/1920/1080/${type}?lock=${i + 1}`
            };
        });

        // 2. Direct-load, CDN-safe GIFs
        const safeGifs = [
            "https://media1.giphy.com/media/v1.Y2lkPTc5MGI3NjExMTA4YXB3eHN3YWFwZXhvdDJmdmdidXBzYXVzdmN2cHd0Z2g5MWpveSZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/Y0S4fVJVfscO4/giphy.gif",
            "https://media4.giphy.com/media/v1.Y2lkPTc5MGI3NjExYnAwM244cjM3czl0Y3V0cXR0OHB0MGR5aHF3Zm84ejV4ajU4a3N0MCZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/G6F8An4vKOfU4/giphy.gif"
        ];

        // 3. Search Functionality
        function performSearch() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allProducts.filter(p => p.title.toLowerCase().includes(query));
            renderGrid(filtered);
        }

        // 4. Render Grid
        function renderGrid(itemsToRender = allProducts) {
            const grid = document.getElementById('productGrid');
            
            grid.innerHTML = itemsToRender.slice(0, 8).map(item => `
            <div class="bg-white p-5 flex flex-col justify-between shadow-sm">
                <h2 class="text-xl font-bold mb-4">${item.category}</h2>
                <div class="flex-1 flex flex-col justify-between mb-2 cursor-pointer">
                    <!-- Images are dynamically pulled at 1920x1080 -->
                    <img src="${item.img}" class="w-full h-40 object-cover mb-2" alt="${item.title}">
                    <p class="text-sm text-gray-800 line-clamp-2">${item.title}</p>
                    <p class="text-lg text-red-700 font-semibold mb-2">₹${item.price}</p>
                    <button onclick="intercept(${item.id})" class="w-full bg-amz-yellow hover:bg-yellow-500 py-1 rounded text-sm font-medium border border-yellow-500">Buy Now</button>
                </div>
            </div>
            `).join('');
        }

        // 5. Intercept Modal Logic
        function intercept(id) {
            const p = allProducts.find(x => x.id === id);
            document.getElementById('modalMsg').innerText = `Dabbulu dhandaga ra! Why are you trying to buy a ${p.title} for ₹${p.price}? Stay calm.`;
            
            const randomGif = safeGifs[Math.floor(Math.random() * safeGifs.length)];
            document.getElementById('modalGif').src = randomGif;
            
            document.getElementById('modal').classList.remove('hidden');
            document.body.style.overflow = 'hidden'; 
        }

        // 6. Close Modal Logic
        function closeModal(event, force = false) {
            if (force || event.target === document.getElementById('modal')) {
                document.getElementById('modal').classList.add('hidden');
                document.body.style.overflow = 'auto'; 
            }
        }

        // Escape key to close modal
        document.addEventListener('keydown', function(event){
            if(event.key === "Escape"){
                closeModal(event, true);
            }
        });

        // Initialize on load
        window.onload = () => renderGrid(allProducts);
    </script>
