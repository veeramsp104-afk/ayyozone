<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ayyozone.in</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">

    <!-- Header -->
    <header class="bg-[#131921] text-white p-4">
        <input type="text" id="searchInput" oninput="performSearch()" class="w-full p-2 text-black rounded" placeholder="Search 5,000 items...">
    </header>

    <!-- Product Grid -->
    <div id="productGrid" class="grid grid-cols-2 md:grid-cols-4 gap-4 p-4"></div>

    <!-- Anti-Spending Modal -->
    <div id="modal" class="fixed inset-0 bg-black bg-opacity-80 flex items-center justify-center hidden">
        <div class="bg-white p-6 rounded shadow-xl text-center max-w-sm">
            <h2 class="text-2xl font-bold text-red-600 mb-2">STOP!</h2>
            <p id="modalMsg" class="mb-4"></p>
            <img id="modalGif" src="" class="w-full h-48 object-cover mb-4 rounded">
            <button onclick="closeModal()" class="bg-yellow-400 w-full py-2 font-bold rounded">Close & Save Money</button>
        </div>
    </div>

    <script>
        // 1. The 5,000 Item Registry
        const allProducts = Array.from({ length: 5000 }, (_, i) => ({
            id: i + 1,
            title: `Product ${i + 1}`,
            price: Math.floor(Math.random() * 5000) + 100
        }));

        // 2. The GIF List
        const gifs = [
            "https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExMTA4YXB3eHN3YWFwZXhvdDJmdmdidXBzYXVzdmN2cHd0Z2g5MWpveSZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/Y0S4fVJVfscO4/giphy.gif",
            "https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExYnAwM244cjM3czl0Y3V0cXR0OHB0MGR5aHF3Zm84ejV4ajU4a3N0MCZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/G6F8An4vKOfU4/giphy.gif"
        ];

        function performSearch() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allProducts.filter(p => p.title.toLowerCase().includes(query));
            renderGrid(filtered);
        }

        function renderGrid(items) {
            const grid = document.getElementById('productGrid');
            grid.innerHTML = items.slice(0, 50).map(p => `
                <div class="bg-white p-3 border rounded">
                    <p class="font-bold text-sm">${p.title}</p>
                    <p class="text-red-600">₹${p.price}</p>
                    <button onclick="intercept(${p.id})" class="bg-yellow-400 w-full py-1 mt-2 text-sm font-bold rounded">Buy Now</button>
                </div>
            `).join('');
        }

        function intercept(id) {
            const p = allProducts.find(x => x.id === id);
            document.getElementById('modalMsg').innerText = `Dabbulu dhandaga ra! Why are you trying to buy ${p.title} for ₹${p.price}?`;
            document.getElementById('modalGif').src = gifs[Math.floor(Math.random() * gifs.length)];
            document.getElementById('modal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('modal').classList.add('hidden');
        }

        // Initialize display
        renderGrid(allProducts);
    </script>
</body>
</html>
