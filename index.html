<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ayyozone.in</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
    <!-- Header matching image_1f5380.png -->
    <header class="bg-[#131921] text-white p-2 flex items-center">
        <div class="text-xl font-bold">ayyozone.in</div>
        <div class="mx-4 flex flex-1">
            <select class="text-black text-xs p-1"><option>All</option></select>
            <input type="text" id="searchInput" oninput="performSearch()" class="flex-1 text-black p-1" placeholder="Search Ayyozone.in">
            <button class="bg-[#febd69] text-black px-4"><i class="fa fa-search"></i></button>
        </div>
    </header>

    <div id="productGrid" class="grid grid-cols-4 gap-4 p-4"></div>

    <script>
        // Generate 5000 items safely
        const allProducts = Array.from({ length: 5000 }, (_, i) => ({
            id: i + 1,
            title: `Product ${i + 1}`,
            price: Math.floor(Math.random() * 5000) + 100
        }));

        function performSearch() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allProducts.filter(p => p.title.toLowerCase().includes(query));
            render(filtered);
        }

        function render(items) {
            const grid = document.getElementById('productGrid');
            grid.innerHTML = items.slice(0, 50).map(p => `
                <div class="border p-2">
                    <p>${p.title}</p>
                    <p>₹${p.price}</p>
                    <button onclick="alert('Dabbulu dhandaga ra!')" class="bg-yellow-400 w-full">Buy Now</button>
                </div>
            `).join('');
        }
        
        render(allProducts);
    </script>
</body>
</html>
